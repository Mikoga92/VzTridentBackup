[gcode_macro CANCEL_PRINT]
description: Cancel the actual running print
rename_existing: CANCEL_PRINT_BASE
gcode:
    TURN_OFF_HEATERS
    SET_GCODE_OFFSET Z=0
    CANCEL_PRINT_BASE
    # Startet den 20-Minuten-Timer (1200 Sekunden) zum Lüfter ausschalten
    UPDATE_DELAYED_GCODE ID=fan_off_timer DURATION=1200

[delayed_gcode fan_off_timer]
gcode:
    # Prüft, ob der Drucker im Status "printing" ist
    {% if printer.idle_timeout.state != "Printing" %}
        M107 ; Bauteillüfter aus
        M118 Lüfter nach Timeout deaktiviert.
    {% else %}
        M118 Druck läuft - Lüfter-Timer ignoriert.
    {% endif %}

[delayed_gcode init_filament_sensor]
initial_duration: 1.0
gcode:
    SET_FILAMENT_SENSOR SENSOR=filament_sensor ENABLE=1

[gcode_macro PAUSE]
description: Pause the actual running print
rename_existing: PAUSE_BASE
variable_extrude: 1.0
gcode:
    ##### read E from pause macro #####
    {% set E = printer["gcode_macro PAUSE"].extrude|float %}
    ##### set park positon for x and y #####
    # default is your max posion from your printer.cfg
    {% set x_park = printer.toolhead.axis_maximum.x|float - 5.0 %}
    {% set y_park = printer.toolhead.axis_maximum.y|float - 5.0 %}
    ##### calculate save lift position #####
    {% set max_z = printer.toolhead.axis_maximum.z|float %}
    {% set act_z = printer.toolhead.position.z|float %}
    {% if act_z < (max_z - 2.0) %}
        {% set z_safe = 2.0 %}
    {% else %}
        {% set z_safe = max_z - act_z %}
    {% endif %}
    ##### end of definitions #####
    PAUSE_BASE
    G91
    {% if printer.extruder.can_extrude|lower == 'true' %}
      G1 E-{E} F2100
    {% else %}
      {action_respond_info("Extruder not hot enough")}
    {% endif %}
    {% if "xyz" in printer.toolhead.homed_axes %}
      G1 Z{z_safe} F900
      G90
      G1 X{x_park} Y{y_park} F6000
    {% else %}
      {action_respond_info("Printer not homed")}
    {% endif %} 
    
[gcode_macro RESUME]
description: Resume the actual running print
rename_existing: RESUME_BASE
gcode:
    ##### read E from pause macro #####
    {% set E = printer["gcode_macro PAUSE"].extrude|float %}
    #### get VELOCITY parameter if specified ####
    {% if 'VELOCITY' in params|upper %}
      {% set get_params = ('VELOCITY=' + params.VELOCITY)  %}
    {%else %}
      {% set get_params = "" %}
    {% endif %}
    ##### end of definitions #####
    {% if printer.extruder.can_extrude|lower == 'true' %}
      G91
      G1 E{E} F2100
    {% else %}
      {action_respond_info("Extruder not hot enough")}
    {% endif %}  
    RESUME_BASE {get_params}
    
[gcode_macro END_PRINT]
description: Beendet den Druck nach Wiki-Standard
gcode:
    M140 S0 ; Bett aus
    M104 S0 ; Hotend aus
    M106 S0 ; Lüfter aus
    G91
    G1 E-2 F2700
    G1 Z5 F3000
    G90
    G1 X5 Y{printer.toolhead.axis_maximum.y - 50} F6000
    BED_MESH_CLEAR
    PROBE_EDDY_NG_SET_TAP_OFFSET VALUE=0
    SET_GCODE_OFFSET Z=0
    M84
    M117 Druck fertig.
    
[gcode_macro HEAT_SOAK]
gcode:
    {% set bed_temp = params.BED|default(60)|float %}
    {% set soak_min = params.TIME|default(0)|int %}
    {% set soak_milsec = soak_min * 60 * 1000 %} # Wir rechnen hier fest um

    M117 Heize Bett...
    M190 S{bed_temp}

    {% if soak_min > 0 %}
        RESPOND MSG="Wartezeit: {soak_min} Minuten"
        M117 Soak aktiv...
        G4 P{soak_milsec}      ; HIER MUSS ER WARTEN
        M107                ; Luefter aus
        M117 Wartezeit vorbei!
        SET_FAN_SPEED FAN=Luftfilter SPEED=1.0
    {% else %}
        M117 Keine Wartezeit.
    {% endif %}

[gcode_macro CANCEL_PRINT]
description: Abbrechen des aktuellen Drucks
rename_existing: CANCEL_PRINT_BASE
gcode:
  TURN_OFF_HEATERS
    CANCEL_PRINT_BASE

[gcode_macro RESET_ACCEL]
description: Setzt die Beschleunigung auf die Standardwerte der Drucker-Konfiguration zurück
gcode:
  {% set max_accel = printer.configfile.settings.printer.max_accel %}
  {% set max_accel_to_decel = printer.configfile.settings.printer.max_accel_to_decel|default(max_accel / 2) %}
  
  SET_VELOCITY_LIMIT ACCEL={max_accel} ACCEL_TO_DECEL={max_accel_to_decel}
  
  {action_respond_info("Beschleunigung auf Max-Wert zurückgesetzt: %d" % max_accel)}