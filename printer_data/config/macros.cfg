[gcode_macro Z_TILT_ADJUST]
rename_existing: _Z_TILT_ADJUST
gcode:
    BDSENSOR_SET QGL_TILT_PROBE=1
    BDSENSOR_SET COLLISION_HOMING=0
    _Z_TILT_ADJUST horizontal_move_z=6 retry_tolerance=1
    G28 Z0
    BDSENSOR_SET QGL_TILT_PROBE=0
    _Z_TILT_ADJUST horizontal_move_z=1 retry_tolerance=0.04
    G28 Z0
    
[gcode_macro SET_STALL_SENSITIVITY]
description: Setzt die StallGuard-Empfindlichkeit für X und Y temporär
gcode:
    {% set SENSITIVITY = params.SENSITIVITY|default(100)|int %}
    SET_TMC_FIELD STEPPER=stepper_x FIELD=SGTHRS VALUE={SENSITIVITY}
    SET_TMC_FIELD STEPPER=stepper_y FIELD=SGTHRS VALUE={SENSITIVITY}
    M117 StallGuard auf {SENSITIVITY} gesetzt
    
[gcode_macro CALIBRATE_X]
description: Homet X mit einem frei wählbaren StallGuard-Wert. Beispiel: CALIBRATE_X VALUE=115
gcode:
    {% set SG_VAL = params.VALUE|default(140)|int %}
    M117 Teste X mit SG: {SG_VAL}
    SET_TMC_FIELD STEPPER=stepper_x FIELD=SGTHRS VALUE={SG_VAL}
    G28 X

[gcode_macro CALIBRATE_Y]
description: Homet Y mit einem frei wählbaren StallGuard-Wert. Beispiel: CALIBRATE_Y VALUE=120
gcode:
    {% set SG_VAL = params.VALUE|default(140)|int %}
    M117 Teste Y mit SG: {SG_VAL}
    SET_TMC_FIELD STEPPER=stepper_y FIELD=SGTHRS VALUE={SG_VAL}
    G28 Y
    

