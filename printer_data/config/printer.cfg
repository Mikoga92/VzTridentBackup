
# This file contains common pin mappings for the BigTreeTech Octopus
# and Octopus Pro boards. To use this config, start by identifying the
# micro-controller on the board - it may be an STM32F446, STM32F429,
# or an STM32H723.  Select the appropriate micro-controller in "make
# menuconfig" and select "Enable low-level configuration options". For
# STM32F446 boards the firmware should be compiled with a "32KiB
# bootloader" and a "12MHz crystal" clock reference. For STM32F429
# boards use a "32KiB bootloader" and an "8MHz crystal". For STM32H723
# boards use a "128KiB bootloader" and a "25Mhz crystal".

# See docs/Config_Reference.md for a description of parameters.
#[include eddy_ng.cfg]
[include macros.cfg]
[include clean_nozzle.cfg]
[include speed_test.cfg]
[include leds.cfg]
[include BdSensor.cfg]
#[include input_shaping.cfg]
[exclude_object] 
[gcode_arcs]
resolution: 1
[virtual_sdcard]
path: ~/printer_data/gcodes
on_error_gcode: CANCEL_PRINT
[pause_resume]
[display_status]
[force_move]
enable_force_move: true
#[safe_z_home]
#z_hop: 5
#home_xy_position: 165, 165
[z_tilt]
z_positions:
    365, -5    # front right stepper_z
    -35, -5    # front left stepper_z1
    165, 400   # back stepper_z2
points:
    20, 20      # left
    310, 20    # right
    115, 310   # back
speed: 300
horizontal_move_z: 10
retries: 5 
retry_tolerance: 0.01
# Driver0
[stepper_x]
step_pin: PF13
dir_pin: PF12
enable_pin: !PF14
microsteps: 64
rotation_distance: 40
endstop_pin: tmc2209_stepper_x:virtual_endstop #PG6
homing_retract_dist: 20 
homing_retract_speed: 100
position_endstop: 0
position_max: 323.5
position_min: 0
homing_speed: 120
homing_positive_dir: false

# Driver1
[stepper_y]
step_pin: PG0
dir_pin: PG1
enable_pin: !PF15
microsteps: 64
rotation_distance: 40
endstop_pin: tmc2209_stepper_y:virtual_endstop #PG9
homing_retract_dist: 20
homing_retract_speed: 100
position_endstop: 0
position_max: 335
position_min: 0
homing_speed: 120
homing_positive_dir: false

# Driver2
[stepper_z]
step_pin: PF11
dir_pin: !PG3
enable_pin: !PG5
microsteps: 64
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop #PG10 #probe:z_virtual_endstop
homing_retract_dist: 5
homing_retract_speed: 2
homing_speed: 5
second_homing_speed: 3
position_min: -1
#position_endstop: 3
position_max: 400

# Driver3
[stepper_z1]
step_pin: PG4
dir_pin: !PC1
enable_pin: !PA2
microsteps: 64
rotation_distance: 8

[stepper_z2]
step_pin: PC13
dir_pin: !PF0
enable_pin: !PF1
microsteps: 64
rotation_distance: 8

# Driver4
[extruder]
max_extrude_only_distance: 100.0
step_pin: PF9
dir_pin: !PF10
enable_pin: !PG2
microsteps: 16
rotation_distance: 22.6877
gear_ratio: 50:10 #for sherpa mini 8t motor
nozzle_diameter: 0.600
filament_diameter: 1.750
heater_pin: PA3 # HE1
sensor_pin:  PF4 # T0
sensor_type: ATC Semitec 104NT-4-R025H42G #EPCOS 100K B57560G104F
min_temp: 0
max_temp: 300

#[filament_switch_sensor filament_sensor]
#pause_on_runout: true
#switch_pin: !PB7
#runout_gcode:
#  M117 Filament leer!
#insert_gcode:
#  M117 Filament eingelegt.

[bdwidth filament_sensor]
port:usb
serial:/dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
default_nominal_filament_diameter: 1.75 # (mm)
enable: all
#   width(only enable the width function)
#   motion(only enable the motion function)
#   all(enable both the width and motion)
#   disable(disable both the width and motion)
min_diameter: 1.0
#   Minimal allowed diameter for flow rate adjust and runout.
max_diameter: 2.0
#   Maximum allowed diameter for flow rate adjust and runout.
extruder:extruder
runout_delay_length : 8.0  
#    (mm) increase this value if the print speed is high or with high flowrate 
#    else it may trigger the runout and pause
flowrate_adjust_length : 5  # (mm)
pause_on_runout: True
sample_time:2
#  in seconds, should be > 0.3s
sensor_to_nozzle_length: 955
#   how to measure:https://github.com/markniu/bdwidth/blob/main/doc/lengthToNozzle.jpg
logging: False
#   Out data to the file bdwidth.log.csv,
debug_info: True
#   Output diameter to terminal/console and klipper.log 

[heater_bed]
heater_pin: PA1
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PF3 # TB
min_temp: 0
max_temp: 130

[multi_pin part_cooling_pins]
pins: PA8, PE5 

[fan]
pin: PA8 #PE5
kick_start_time: 0.5

[heater_fan hotend]
pin: PD12

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_0E0020000951333231343036-if00
    
[printer]
kinematics: corexy
max_velocity: 500
max_accel: 10000
max_z_velocity: 30
max_z_accel: 500

[tmc2209 stepper_x]
uart_pin: PC4
diag_pin: ^PG6
run_current: 1.0
driver_SGTHRS: 80

[tmc2209 stepper_y]
uart_pin: PD11
diag_pin: ^PG9
run_current: 1.0
driver_SGTHRS: 70

[tmc2209 stepper_z]
uart_pin: PC6
#diag_pin: PG10
run_current: 1.1

[tmc2209 stepper_z1]
uart_pin: PC7
#diag_pin: PG11
run_current: 1.1

[tmc2209 stepper_z2]
uart_pin: PE4
#diag_pin: PG13
run_current: 1.1

[tmc2209 extruder]
uart_pin: PF2
run_current: 0.70

#[board_pins]
#aliases:
#    # EXP1 header
#    EXP1_1=PE8, EXP1_2=PE7,
#    EXP1_3=PE9, EXP1_4=PE10,
#    EXP1_5=PE12, EXP1_6=PE13,    # Slot in the socket on this side
#    EXP1_7=PE14, EXP1_8=PE15,
#    EXP1_9=<GND>, EXP1_10=<5V>,
#
#    # EXP2 header
#    EXP2_1=PA6, EXP2_2=PA5,
#    EXP2_3=PB1, EXP2_4=PA4,
#    EXP2_5=PB2, EXP2_6=PA7,      # Slot in the socket on this side
#    EXP2_7=PC15, EXP2_8=<RST>,
#    EXP2_9=<GND>, EXP2_10=PC5

[input_shaper]
shaper_freq_x: 107.6 # center frequency for the X axis filter
shaper_type_x: ei # filter type for the X axis
shaper_freq_y: 61.8 # center frequency for the Y axis filter
shaper_type_y: mzv # filter type for the Y axis
damping_ratio_x: 0.101 # damping ratio for the X axis
damping_ratio_y: 0.045 # damping ratio for the Y axis

[bed_mesh]
horizontal_move_z: 1
speed: 250
mesh_min: 30, 33
mesh_max: 280, 280
probe_count: 10, 10
zero_reference_position: 165, 165
algorithm: bicubic

