[neopixel caselighting]
pin: PB10
chain_count: 19              
color_order: GRB
initial_RED: 0.25            # Von 0.6 auf 0.25 gedimmt (reicht völlig als Grundlicht)
initial_GREEN: 0.25
initial_BLUE: 0.25

[led_effect case_calibrating_z]
leds:
    neopixel:caselighting (1-19)
autostart: false
frame_rate: 24
layers:
    # Original: (0.8, 0.0, 0.35) -> Extremes Magenta/Pink
    # Neu: Werte stark reduziert und etwas Grün hinzugefügt, damit es weicher/blasser wird
    comet 0.3 6 add (0.3, 0.08, 0.18), (0.15, 0.05, 0.25)
    comet -0.3 6 add (0.3, 0.08, 0.18), (0.15, 0.05, 0.25)

[led_effect case_cleaning]
leds:
    neopixel:caselighting
autostart: false
frame_rate: 24
layers:
    # Hier haben wir die Helligkeit halbiert, damit das Funkeln die Kamera nicht triggert
    twinkle 4 0.05 add (0.0, 0.01, 0.25)
    twinkle 2 0.1 add (0.0, 0.03, 0.1)

### Critical Error ###
[led_effect critical_error]
leds:
    neopixel:caselighting
autostart: false
frame_rate: 24
run_on_error: true
layers:
    # Ein Strobe mit (1.0, 1.0, 1.0) killt jeden Kamerasensor. 
    # Reduziert auf 0.4 Weiß und ein gedämpfteres Rot darunter.
    strobe 1 1.5 add (0.4, 0.4, 0.4)
    breathing 2 0 difference (0.5, 0.0, 0.0)
    static 1 0 top (0.5, 0.0, 0.0)
    