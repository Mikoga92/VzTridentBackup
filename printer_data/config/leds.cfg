[neopixel caselighting]
pin: PB10
chain_count: 19              # Number of LEDs per single side
color_order: GRB
initial_RED: 0.2
initial_GREEN: 0.2
initial_BLUE: 0.2

[gcode_macro led_busy]
gcode:
    STOP_LED_EFFECTS ;cancel all others
    SET_LED_EFFECT EFFECT=nozzle_on

[led_effect case_calibrating_z]
leds:
    neopixel:caselighting (1-19)
autostart: false
frame_rate: 24
layers:
    comet 0.3 6 add (0.3,0.05,0.15),(0.15,0.05,0.25)
    comet -0.3 6 add (0.3,0.05,0.15),(0.15,0.05,0.25)
    
[gcode_macro led_calibrating_z]
gcode:
    STOP_LED_EFFECTS ;cancel all others
    SET_LED_EFFECT EFFECT=case_calibrating_z

[led_effect case_cleaning]
leds:
    neopixel:caselighting
autostart: false
frame_rate: 24
layers:
    twinkle 4 0.05 add (0.01,0.03,0.2)
    twinkle 2 0.1 add (0.01,0.04,0.1)

[gcode_macro led_cleaning]
gcode:
    STOP_LED_EFFECTS ;cancel all others
    SET_LED_EFFECT EFFECT=case_cleaning

### Critical Error ###
[led_effect critical_error]
leds:
    neopixel:caselighting
autostart: false
frame_rate: 24
run_on_error: true
layers:
    strobe 1 1.5 add (0.4,0.4,0.4)
    breathing 2 0 difference (0.4,0.02,0.02)
    static 1 0 top (0.4,0.0,0.0)

[gcode_macro led_blinkenlights]
gcode:
    STOP_LED_EFFECTS ;cancel all others
    SET_LED_EFFECT EFFECT=critical_error ; This activates all LEDs

[led_effect case_heating]
leds:
    neopixel:caselighting (1-19)
autostart: false
frame_rate: 24
