#####################################################################
#  NEOPIXEL DEFINITION
#####################################################################

[neopixel caselighting]
pin: PB10
chain_count: 19              # Anzahl der LEDs pro Einzelseite
color_order: GRB
initial_RED: 0.25            # Angenehmes, gedimmtes Grundlicht
initial_GREEN: 0.25
initial_BLUE: 0.25

#####################################################################
#  LED EFFEKTE & MAKROS
#####################################################################

# --- BUSY ---
[gcode_macro led_busy]
gcode:
    STOP_LED_EFFECTS         ; Bricht alle anderen Effekte ab
    SET_LED_EFFECT EFFECT=nozzle_on

# --- CALIBRATING Z ---
[led_effect case_calibrating_z]
leds:
    neopixel:caselighting (1-19)
autostart: false
frame_rate: 24
layers:
    # Farbtöne stark reduziert und leicht gemischt für weichere Übergänge
    comet 0.3 6 add (0.3, 0.08, 0.18), (0.15, 0.05, 0.25)
    comet -0.3 6 add (0.3, 0.08, 0.18), (0.15, 0.05, 0.25)
    
[gcode_macro led_calibrating_z]
gcode:
    STOP_LED_EFFECTS 
    SET_LED_EFFECT EFFECT=case_calibrating_z

# --- CLEANING ---
[led_effect case_cleaning]
leds:
    neopixel:caselighting
autostart: false
frame_rate: 24
layers:
    # Helligkeit halbiert, damit das Funkeln die Kamera nicht blendet
    twinkle 4 0.05 add (0.0, 0.01, 0.25)
    twinkle 2 0.1 add (0.0, 0.03, 0.1)

[gcode_macro led_cleaning]
gcode:
    STOP_LED_EFFECTS 
    SET_LED_EFFECT EFFECT=case_cleaning

# --- HEATING ---
[led_effect case_heating]
leds:
    neopixel:caselighting (1-19)
autostart: false
frame_rate: 24
layers:
    # Ein sanft pulsierendes, dezentes Orange-Rot
    breathing 3 1 top (0.4, 0.1, 0.0), (0.15, 0.02, 0.0)

[gcode_macro led_heating]
gcode:
    STOP_LED_EFFECTS
    SET_LED_EFFECT EFFECT=case_heating

# --- CRITICAL ERROR ---
[led_effect critical_error]
leds:
    neopixel:caselighting
autostart: false
frame_rate: 24
run_on_error
