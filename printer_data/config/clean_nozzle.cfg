###################################################################################################################################################################
# Clean Nozzle Macro - Fixed & Optimized for Continuous Cooling Wipe
###################################################################################################################################################################

[gcode_macro CLEAN_NOZZLE_VARIABLES]
description: Stores all of the necessary variables for the nozzle cleaning macros.

# --- BITTE DIESE WERTE AN DEINEN DRUCKER ANPASSEN ---
variable_wipe_x: 10
variable_wipe_side_x: 40
variable_wipe_start_y: 328
variable_wipe_end_y: 334
variable_wipe_z: 3
variable_high_wipe_z: 3
variable_wipe_travel_z: 15

variable_z_speed: 10 
variable_wipe_speed: 80       # mm/s -> Für G1 wird es im Macro * 60 gerechnet
variable_wipe_accel: 3000
variable_wipe_travel_speed: 150 

variable_calibration_xy_speed: 150
variable_calibration_accel: 5000
gcode:
    M118 Variablen geladen

###################################################################################################################################################################

[gcode_macro CLEAN_NOZZLE_BRUSH]
description: Clean nozzle while cooling down to a temperature appropriate for Eddy Tap.
gcode: 
    # Temperatur-Variablen
    {% set cleaning_temp = params.CLEANING_TEMP|default(270)|float %}
    {% set tap_temp = 150 %}

    # Geschwindigkeiten extrahieren (mm/s für Limits, mm/min für G1)
    {% set wipe_speed_mm_s = printer["gcode_macro CLEAN_NOZZLE_VARIABLES"].wipe_speed %}
    {% set WIPE_SPEED_G1 = wipe_speed_mm_s * 60 %}
    {% set WIPE_ACCEL = printer["gcode_macro CLEAN_NOZZLE_VARIABLES"].wipe_accel %}
    {% set WIPE_TRAVEL_SPEED = printer["gcode_macro CLEAN_NOZZLE_VARIABLES"].wipe_travel_speed * 60 %}
    {% set WIPE_Z_SPEED = printer["gcode_macro CLEAN_NOZZLE_VARIABLES"].z_speed * 60 %}
    
    # Positionen laden
    {% set WIPE_X = printer["gcode_macro CLEAN_NOZZLE_VARIABLES"].wipe_x %}
    {% set WIPE_SIDE_X = printer["gcode_macro CLEAN_NOZZLE_VARIABLES"].wipe_side_x %}
    {% set WIPE_START_Y = printer["gcode_macro CLEAN_NOZZLE_VARIABLES"].wipe_start_y %}
    {% set WIPE_END_Y = printer["gcode_macro CLEAN_NOZZLE_VARIABLES"].wipe_end_y %}
    
    {% set WIPE_TRAVEL_Z = printer["gcode_macro CLEAN_NOZZLE_VARIABLES"].wipe_travel_z %}
    {% set WIPE_Z = printer["gcode_macro CLEAN_NOZZLE_VARIABLES"].wipe_z %}
    {% set HIGH_WIPE_Z = printer["gcode_macro CLEAN_NOZZLE_VARIABLES"].high_wipe_z %}

    {% set cal_speed_mm_s = printer["gcode_macro CLEAN_NOZZLE_VARIABLES"].calibration_xy_speed %}
    {% set XY_SPEED_G1 = cal_speed_mm_s * 60 %}
    {% set ACCEL = printer["gcode_macro CLEAN_NOZZLE_VARIABLES"].calibration_accel %}

    ################################
    # Vorbereitung & Aufheizen
    ################################
    # FIX: Limit benötigt mm/s, nicht mm/min!
    SET_VELOCITY_LIMIT SPEED={wipe_speed_mm_s} ACCEL={WIPE_ACCEL}

    # Zur Bürste fahren
    G1 X165 Y165
    G1 Z{WIPE_TRAVEL_Z} F{WIPE_Z_SPEED}
    G1 X{WIPE_X} Y{WIPE_START_Y} F{WIPE_TRAVEL_SPEED}
  
    M117 Aufheizen zum Reinigen...
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET={cleaning_temp}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={cleaning_temp - 2} MAXIMUM={cleaning_temp + 5}

    ################################
    # 1. Wischen (Heiß)
    ################################
    M117 Grobreinigung...
    G1 Z{WIPE_Z} F{WIPE_Z_SPEED}
   
    M106 P0 S255 # Bauteillüfter auf 100% für maximale Abkühlgeschwindigkeit

    # Grob vorschrubben
    {% for i in range(6): %}
      G1 Y{WIPE_END_Y} F{WIPE_SPEED_G1}
      G1 Y{WIPE_START_Y} F{WIPE_SPEED_G1}
    {% endfor %}
    
    ################################
    # Abkühlen & Kontinuierliches Wischen
    ################################
    M117 Abkuehlen auf 150C + Wischen...
    G1 E-4 F2400 ; FIX: Etwas hoeherer Retract (4mm), um den Druck im Hotend effektiv zu nehmen
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET={tap_temp}

    G1 Z{HIGH_WIPE_Z} F600
    
    # Berechne Y-Schritte für echtes Zick-Zack (4 Segmente)
    {% set y_chunk = (WIPE_END_Y - WIPE_START_Y) / 4 %}

    # 40 Zyklen halten die Nozzle ca. 45-50 Sekunden in Bewegung -> deckt die Abkuehlzeit ab
    {% for cycle in range(40) %}
      # Weg nach hinten (Zick-Zack)
      G1 X{WIPE_SIDE_X} Y{WIPE_START_Y + 1*y_chunk} F{WIPE_SPEED_G1}
      G1 X{WIPE_X}      Y{WIPE_START_Y + 2*y_chunk} F{WIPE_SPEED_G1}
      G1 X{WIPE_SIDE_X} Y{WIPE_START_Y + 3*y_chunk} F{WIPE_SPEED_G1}
      G1 X{WIPE_X}      Y{WIPE_END_Y}               F{WIPE_SPEED_G1}
      
      # Weg nach vorne (Zick-Zack zurück)
      G1 X{WIPE_SIDE_X} Y{WIPE_START_Y + 3*y_chunk} F{WIPE_SPEED_G1}
      G1 X{WIPE_X}      Y{WIPE_START_Y + 2*y_chunk} F{WIPE_SPEED_G1}
      G1 X{WIPE_SIDE_X} Y{WIPE_START_Y + 1*y_chunk} F{WIPE_SPEED_G1}
      G1 X{WIPE_X}      Y{WIPE_START_Y}             F{WIPE_SPEED_G1}
    {% endfor %}

    ################################
    # Sicherheits-Wartezeit (falls noch nicht ganz auf 150°C)
    ################################
    # Da er jetzt ~45 Sek gewischt hat, sollte die Nozzle schon bei 150°C sein.
    # Falls nicht, wartet er den Rest hier (jetzt läuft aber kaum noch was nach).
    TEMPERATURE_WAIT SENSOR=extruder MAXIMUM={tap_temp + 2}
    M106 P0 S0 # Lüfter aus

    # Bürste verlassen
    G1 F{WIPE_TRAVEL_SPEED}
    G1 Y{WIPE_END_Y - 30} 
    G1 Z{WIPE_TRAVEL_Z} F{WIPE_Z_SPEED}

    # FIX: Wieder in mm/s zurücksetzen
    SET_VELOCITY_LIMIT SPEED={cal_speed_mm_s} ACCEL={ACCEL}
    G91
    G1 Y-20 F3000
    G90
    G1 X165 Y165
    M117 Nozzle sauber & bereit